<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日本語">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>日本語 학습</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --text: #1a1a1a;
    --sub: #888;
    --border: #e8e8e8;
    --blue: #3b6fd4;
    --green: #2da870;
    --red: #e05a3a;
    --yellow: #f0a500;
    --radius: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif; color: var(--text); overscroll-behavior: none; }
  
  /* SCREENS */
  .screen { display: none; min-height: 100vh; flex-direction: column; padding: 0; }
  .screen.active { display: flex; }

  /* HOME */
  #home { background: var(--bg); padding: 48px 24px 32px; align-items: center; justify-content: center; }
  .home-logo { text-align: center; margin-bottom: 48px; }
  .home-logo .ja { font-family: 'Noto Sans JP', sans-serif; font-size: 52px; font-weight: 900; color: var(--text); letter-spacing: 6px; line-height: 1; }
  .home-logo .ko { font-size: 13px; color: var(--sub); letter-spacing: 3px; margin-top: 8px; font-weight: 500; }
  .cat-list { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 14px; }
  .cat-card { background: var(--surface); border: none; border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; gap: 18px; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.12s, box-shadow 0.12s; text-align: left; width: 100%; }
  .cat-card:active { transform: scale(0.97); }
  .cat-card .badge { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; flex-shrink: 0; }
  .cat-card .info { flex: 1; }
  .cat-card .info h3 { font-size: 17px; font-weight: 700; color: var(--text); }
  .cat-card .info p { font-size: 12px; color: var(--sub); margin-top: 3px; }
  .cat-card .arrow { color: var(--sub); font-size: 18px; }
  .badge-hira { background: #e8f0fd; color: #3b6fd4; }
  .badge-kata { background: #fde8e2; color: #e05a3a; }
  .badge-kanji { background: #e2f7ed; color: #2da870; }

  /* SETTINGS */
  #settings { background: var(--bg); padding: 0; }
  .settings-inner { padding: 20px 24px 40px; max-width: 480px; width: 100%; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding-top: 8px; }
  .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 4px; line-height: 1; }
  .top-bar h2 { font-size: 20px; font-weight: 700; }
  .top-bar .cat-tag { margin-left: auto; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .tag-hira { background: #e8f0fd; color: #3b6fd4; }
  .tag-kata { background: #fde8e2; color: #e05a3a; }
  .tag-kanji { background: #e2f7ed; color: #2da870; }
  .section-card { background: var(--surface); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .section-label { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .toggle-row:last-child { border-bottom: none; padding-bottom: 0; }
  .toggle-row:first-of-type { padding-top: 0; }
  .toggle-info h4 { font-size: 15px; font-weight: 600; }
  .toggle-info p { font-size: 11px; color: var(--sub); margin-top: 2px; font-family: 'Noto Sans JP', sans-serif; }
  .toggle-switch { width: 48px; height: 26px; background: #ddd; border-radius: 13px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-switch.on { background: var(--blue); }
  .toggle-switch::after { content: ''; width: 22px; height: 22px; background: #fff; border-radius: 11px; position: absolute; top: 2px; left: 2px; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .toggle-switch.on::after { transform: translateX(22px); }
  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-opt { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--border); cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .radio-opt.selected { border-color: var(--blue); background: #eef4ff; }
  .radio-dot { width: 16px; height: 16px; border-radius: 8px; border: 2px solid #ccc; flex-shrink: 0; transition: all 0.15s; }
  .radio-opt.selected .radio-dot { border-color: var(--blue); background: var(--blue); }
  .radio-opt span { font-size: 14px; font-weight: 500; }
  .start-btn { width: 100%; padding: 18px; background: var(--text); color: #fff; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: 1px; font-family: inherit; }
  .start-btn:active { opacity: 0.85; }

  /* QUIZ */
  #quiz { background: var(--bg); }
  .quiz-inner { display: flex; flex-direction: column; flex: 1; padding: 16px 24px 32px; max-width: 480px; width: 100%; margin: 0 auto; }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-top: 4px; }
  .quit-btn { background: none; border: none; font-size: 13px; color: var(--sub); cursor: pointer; padding: 6px; font-family: inherit; }
  .score-chips { display: flex; gap: 10px; }
  .chip { display: flex; align-items: center; gap: 5px; font-size: 14px; font-weight: 700; padding: 5px 12px; border-radius: 20px; }
  .chip-ok { background: #e2f7ed; color: var(--green); }
  .chip-ng { background: #fde8e2; color: var(--red); }
  .progress-track { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.35s cubic-bezier(.4,0,.2,1); }
  .progress-meta { font-size: 12px; color: var(--sub); margin-bottom: 24px; display: flex; gap: 8px; align-items: center; }
  .type-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: var(--border); color: var(--sub); }

  /* CARD */
  .char-card { background: var(--surface); border-radius: 24px; box-shadow: var(--shadow); padding: 44px 24px 36px; text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; min-height: 190px; justify-content: center; transition: border 0.2s; border: 2px solid transparent; }
  .char-card.correct-border { border-color: var(--green); }
  .char-card.wrong-border { border-color: var(--red); }
  .char-display { font-family: 'Noto Sans JP', sans-serif; font-size: 88px; font-weight: 900; line-height: 1; color: var(--text); }
  .answer-hint { margin-top: 14px; display: flex; gap: 14px; }
  .hint-pill { font-size: 13px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
  .hint-romaji { background: #f0f4ff; color: var(--blue); }
  .hint-korean { background: #f0faf5; color: var(--green); }

  /* FEEDBACK */
  .feedback-bar { padding: 12px 16px; border-radius: 12px; text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 16px; display: none; }
  .feedback-bar.show { display: block; }
  .feedback-bar.ok { background: #e2f7ed; color: var(--green); }
  .feedback-bar.ng { background: #fde8e2; color: var(--red); }

  /* INPUT */
  .input-area { margin-top: auto; }
  .mode-label { font-size: 11px; color: var(--sub); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .input-row { display: flex; gap: 10px; }
  .answer-input { flex: 1; padding: 15px 18px; font-size: 16px; border: 1.5px solid var(--border); border-radius: 14px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  .answer-input:focus { border-color: var(--blue); }
  .submit-btn { padding: 15px 20px; background: var(--text); color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .submit-btn:active { opacity: 0.8; }
  .next-btn { width: 100%; padding: 17px; background: var(--blue); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; display: none; }
  .next-btn:active { opacity: 0.85; }

  /* CONFIRM DIALOG */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .overlay.show { display: flex; }
  .dialog { background: var(--surface); border-radius: 24px 24px 0 0; padding: 28px 24px 40px; width: 100%; max-width: 480px; }
  .dialog h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .dialog p { font-size: 14px; color: var(--sub); margin-bottom: 22px; line-height: 1.6; }
  .dialog-btns { display: flex; flex-direction: column; gap: 10px; }
  .dialog-btn { padding: 15px; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-save { background: var(--blue); color: #fff; }
  .btn-reset { background: #fde8e2; color: var(--red); }
  .btn-cancel { background: var(--border); color: var(--sub); }

  /* RESULT */
  #result { background: var(--bg); }
  .result-inner { padding: 40px 24px 40px; max-width: 480px; width: 100%; margin: 0 auto; }
  .result-hero { text-align: center; margin-bottom: 32px; }
  .result-title { font-size: 28px; font-weight: 900; letter-spacing: 2px; color: var(--text); }
  .result-sub { font-size: 13px; color: var(--sub); margin-top: 6px; }
  .result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .stat-box { background: var(--surface); border-radius: 16px; padding: 20px 10px; text-align: center; box-shadow: var(--shadow); }
  .stat-num { font-size: 36px; font-weight: 900; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--sub); margin-top: 6px; font-weight: 600; }
  .stat-ok .stat-num { color: var(--green); }
  .stat-ng .stat-num { color: var(--red); }
  .stat-rate .stat-num { color: var(--blue); font-size: 30px; }
  .donut-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
  .donut-svg { width: 140px; height: 140px; }
  .wrong-section { margin-bottom: 24px; }
  .wrong-title { font-size: 13px; font-weight: 700; color: var(--sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .wrong-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 8px; }
  .wrong-chip { background: #fde8e2; color: var(--red); border-radius: 10px; padding: 10px 6px; text-align: center; font-size: 11px; }
  .wrong-chip .wc { font-family: 'Noto Sans JP', sans-serif; font-size: 22px; font-weight: 700; display: block; line-height: 1.2; }
  .wrong-chip .wr { font-size: 10px; color: #c04020; margin-top: 2px; }
  .result-btns { display: flex; gap: 12px; }
  .res-retry { flex: 1; padding: 16px; background: var(--text); color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .res-home { flex: 1; padding: 16px; background: var(--border); color: var(--sub); border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* SHAKE */
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
  }
  .shake { animation: shake 0.4s ease; }

  /* CELEBRATION */
  @keyframes pop { 0%{transform:scale(0.7);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
  .result-hero { animation: pop 0.5s ease forwards; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-logo">
    <div class="ja">日本語</div>
    <div class="ko">일본어 학습</div>
  </div>
  <div class="cat-list">
    <button class="cat-card" onclick="gotoSettings('hiragana')">
      <div class="badge badge-hira">あ</div>
      <div class="info"><h3>히라가나</h3><p>あいうえお · 46자 기본 + 탁음/요음</p></div>
      <span class="arrow">›</span>
    </button>
    <button class="cat-card" onclick="gotoSettings('katakana')">
      <div class="badge badge-kata">ア</div>
      <div class="info"><h3>가타카나</h3><p>アイウエオ · 46자 기본 + 탁음/요음</p></div>
      <span class="arrow">›</span>
    </button>
    <button class="cat-card" onclick="gotoSettings('kanji')">
      <div class="badge badge-kanji">字</div>
      <div class="info"><h3>상용 한자</h3><p>日月火水 · 자주 쓰는 한자 50자</p></div>
      <span class="arrow">›</span>
    </button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <div class="settings-inner">
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('home')">‹</button>
      <h2>퀴즈 설정</h2>
      <span id="cat-tag" class="cat-tag"></span>
    </div>

    <div id="sound-options" class="section-card">
      <div class="section-label">포함할 음 종류</div>
      <div class="toggle-row" onclick="toggleSetting('dakuten')">
        <div class="toggle-info"><h4>탁음</h4><p>が・ざ・だ・ば행</p></div>
        <div class="toggle-switch" id="t-dakuten"></div>
      </div>
      <div class="toggle-row" onclick="toggleSetting('handakuten')">
        <div class="toggle-info"><h4>반탁음</h4><p>ぱぴぷぺぽ</p></div>
        <div class="toggle-switch" id="t-handakuten"></div>
      </div>
      <div class="toggle-row" onclick="toggleSetting('youon')">
        <div class="toggle-info"><h4>요음</h4><p>きゃ・しゅ・ちょ</p></div>
        <div class="toggle-switch" id="t-youon"></div>
      </div>
      <div class="toggle-row" onclick="toggleSetting('sokuon')">
        <div class="toggle-info"><h4>촉음</h4><p>っ / ッ</p></div>
        <div class="toggle-switch" id="t-sokuon"></div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-label">답변 방식</div>
      <div class="radio-group">
        <div class="radio-opt" id="r-romaji" onclick="setAnswerMode('romaji')">
          <div class="radio-dot"></div><span>로마자 (romaji)</span>
        </div>
        <div class="radio-opt" id="r-korean" onclick="setAnswerMode('korean')">
          <div class="radio-dot"></div><span>한글 발음</span>
        </div>
        <div class="radio-opt" id="r-both" onclick="setAnswerMode('both')">
          <div class="radio-dot"></div><span>둘 다 (로마자 → 한글 순)</span>
        </div>
      </div>
    </div>

    <button class="start-btn" onclick="startQuiz()">퀴즈 시작 →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-inner">
    <div class="quiz-header">
      <button class="quit-btn" onclick="confirmQuit()">✕ 나가기</button>
      <div class="score-chips">
        <div class="chip chip-ok">✓ <span id="score-ok">0</span></div>
        <div class="chip chip-ng">✗ <span id="score-ng">0</span></div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-meta">
      <span id="progress-text">1 / 1</span>
      <span class="type-tag" id="type-tag">기본</span>
      <span id="mode-badge" style="font-size:11px;color:var(--sub);"></span>
    </div>

    <div class="char-card" id="char-card">
      <div class="char-display" id="char-display">あ</div>
      <div class="answer-hint" id="answer-hint" style="display:none;">
        <span class="hint-pill hint-romaji" id="hint-romaji"></span>
        <span class="hint-pill hint-korean" id="hint-korean"></span>
      </div>
    </div>

    <div class="feedback-bar" id="feedback-bar"></div>

    <div class="input-area">
      <div class="mode-label" id="mode-label"></div>
      <div class="input-row" id="input-row">
        <input class="answer-input" id="answer-input" type="text" placeholder="" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="submit-btn" onclick="checkAnswer()">확인</button>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-inner">
    <div class="result-hero">
      <div class="result-title">🎌 학습 종료!</div>
      <div class="result-sub" id="result-sub"></div>
    </div>
    <div class="result-stats">
      <div class="stat-box stat-ok">
        <div class="stat-num" id="res-ok">0</div>
        <div class="stat-label">정답</div>
      </div>
      <div class="stat-box stat-ng">
        <div class="stat-num" id="res-ng">0</div>
        <div class="stat-label">오답</div>
      </div>
      <div class="stat-box stat-rate">
        <div class="stat-num" id="res-rate">0%</div>
        <div class="stat-label">정답률</div>
      </div>
    </div>
    <div class="donut-wrap">
      <svg class="donut-svg" viewBox="0 0 100 100" id="donut-svg"></svg>
    </div>
    <div class="wrong-section" id="wrong-section"></div>
    <div class="result-btns">
      <button class="res-retry" onclick="retryQuiz()">다시 도전</button>
      <button class="res-home" onclick="showScreen('home')">홈으로</button>
    </div>
  </div>
</div>

<!-- QUIT DIALOG -->
<div class="overlay" id="quit-overlay">
  <div class="dialog">
    <h3>학습을 나가시겠어요?</h3>
    <p>저장하면 다음에 이어서 풀 수 있어요.<br>포기하면 처음부터 다시 시작합니다.</p>
    <div class="dialog-btns">
      <button class="dialog-btn btn-save" onclick="saveAndQuit()">💾 학습 저장하기</button>
      <button class="dialog-btn btn-reset" onclick="resetAndQuit()">🗑 학습 포기 (리셋)</button>
      <button class="dialog-btn btn-cancel" onclick="closeDialog()">계속 풀기</button>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const DATA = {
  hiragana: [
    {char:"あ",romaji:"a",korean:"아",type:"basic"},{char:"い",romaji:"i",korean:"이",type:"basic"},{char:"う",romaji:"u",korean:"우",type:"basic"},{char:"え",romaji:"e",korean:"에",type:"basic"},{char:"お",romaji:"o",korean:"오",type:"basic"},
    {char:"か",romaji:"ka",korean:"카",type:"basic"},{char:"き",romaji:"ki",korean:"키",type:"basic"},{char:"く",romaji:"ku",korean:"쿠",type:"basic"},{char:"け",romaji:"ke",korean:"케",type:"basic"},{char:"こ",romaji:"ko",korean:"코",type:"basic"},
    {char:"さ",romaji:"sa",korean:"사",type:"basic"},{char:"し",romaji:"shi",korean:"시",type:"basic"},{char:"す",romaji:"su",korean:"스",type:"basic"},{char:"せ",romaji:"se",korean:"세",type:"basic"},{char:"そ",romaji:"so",korean:"소",type:"basic"},
    {char:"た",romaji:"ta",korean:"타",type:"basic"},{char:"ち",romaji:"chi",korean:"치",type:"basic"},{char:"つ",romaji:"tsu",korean:"츠",type:"basic"},{char:"て",romaji:"te",korean:"테",type:"basic"},{char:"と",romaji:"to",korean:"토",type:"basic"},
    {char:"な",romaji:"na",korean:"나",type:"basic"},{char:"に",romaji:"ni",korean:"니",type:"basic"},{char:"ぬ",romaji:"nu",korean:"누",type:"basic"},{char:"ね",romaji:"ne",korean:"네",type:"basic"},{char:"の",romaji:"no",korean:"노",type:"basic"},
    {char:"は",romaji:"ha",korean:"하",type:"basic"},{char:"ひ",romaji:"hi",korean:"히",type:"basic"},{char:"ふ",romaji:"fu",korean:"후",type:"basic"},{char:"へ",romaji:"he",korean:"헤",type:"basic"},{char:"ほ",romaji:"ho",korean:"호",type:"basic"},

const TYPE_LABELS = { basic:"기본", dakuten:"탁음", handakuten:"반탁음", youon:"요음", sokuon:"촉음" };
const SAVE_KEY = 'jpStudySave';

// ===== STATE =====
let cfg = { category: 'hiragana', dakuten: false, handakuten: false, youon: false, sokuon: false, answerMode: 'romaji' };
let quiz = { pool: [], qIndex: 0, wrongQueue: [], score: { ok: 0, ng: 0 }, resultList: [], activeMode: 'romaji', answered: false };

// ===== SCREEN =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== SETTINGS SCREEN =====
function gotoSettings(cat) {
  cfg.category = cat;
  const tag = document.getElementById('cat-tag');
  const labels = { hiragana: '히라가나', katakana: '가타카나', kanji: '상용 한자' };
  const tagClass = { hiragana: 'tag-hira', katakana: 'tag-kata', kanji: 'tag-kanji' };
  tag.textContent = labels[cat];
  tag.className = 'cat-tag ' + tagClass[cat];
  document.getElementById('sound-options').style.display = cat === 'kanji' ? 'none' : 'block';
  updateToggleUI();
  setAnswerMode(cfg.answerMode);
  showScreen('settings');
}

function toggleSetting(key) {
  cfg[key] = !cfg[key];
  updateToggleUI();
}
function updateToggleUI() {
  ['dakuten','handakuten','youon','sokuon'].forEach(k => {
    const el = document.getElementById('t-' + k);
    if (el) el.className = 'toggle-switch' + (cfg[k] ? ' on' : '');
  });
}
function setAnswerMode(mode) {
  cfg.answerMode = mode;
  ['romaji','korean','both'].forEach(m => {
    document.getElementById('r-' + m).className = 'radio-opt' + (mode === m ? ' selected' : '');
  });
}

// ===== QUIZ ENGINE =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPool() {
  return DATA[cfg.category].filter(item => {
    if (item.type === 'basic') return true;
    if (item.type === 'dakuten') return cfg.dakuten;
    if (item.type === 'handakuten') return cfg.handakuten;
    if (item.type === 'youon') return cfg.youon;
    if (item.type === 'sokuon') return cfg.sokuon;
    return false;
  });
}

function startQuiz() {
  // Check saved state
  const saved = loadSave();
  if (saved && saved.category === cfg.category) {
    if (confirm('이전에 저장된 학습이 있어요. 이어서 풀까요?')) {
      quiz = saved.quiz;
      cfg = { ...cfg, ...saved.cfg };
      renderQuestion();
      showScreen('quiz');
      return;
    }
  }
  freshStart();
}

function freshStart() {
  const pool = shuffle(buildPool());
  quiz = {
    pool, qIndex: 0, wrongQueue: [],
    score: { ok: 0, ng: 0 }, resultList: [],
    activeMode: cfg.answerMode === 'both' ? 'romaji' : cfg.answerMode,
    answered: false,
    cfgSnapshot: { ...cfg }
  };
  clearSave();
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const card = quiz.pool[quiz.qIndex];
  if (!card) return;

  // progress
  const pct = (quiz.qIndex / quiz.pool.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = (quiz.qIndex + 1) + ' / ' + quiz.pool.length;
  document.getElementById('type-tag').textContent = TYPE_LABELS[card.type] || '기본';
  document.getElementById('mode-badge').textContent = quiz.activeMode === 'romaji' ? '로마자 입력' : '한글 발음 입력';

  // score
  document.getElementById('score-ok').textContent = quiz.score.ok;
  document.getElementById('score-ng').textContent = quiz.score.ng;

  // card
  document.getElementById('char-display').textContent = card.char;
  document.getElementById('answer-hint').style.display = 'none';

  const cardEl = document.getElementById('char-card');
  cardEl.className = 'char-card';

  // feedback
  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  // input
  const inp = document.getElementById('answer-input');
  inp.value = '';
  inp.placeholder = quiz.activeMode === 'romaji' ? '로마자 입력 (예: ka)' : '한글 발음 입력 (예: 카)';
  document.getElementById('input-row').style.display = 'flex';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('mode-label').textContent = quiz.activeMode === 'romaji' ? '📝 ROMAJI' : '📝 한글 발음';

  quiz.answered = false;
  setTimeout(() => inp.focus(), 100);
}

function checkAnswer() {
  if (quiz.answered) return;
  const card = quiz.pool[quiz.qIndex];
  const userAns = document.getElementById('answer-input').value.trim().toLowerCase();
  if (!userAns) return;

  const corrects = (quiz.activeMode === 'romaji' ? card.romaji : card.korean)
    .split('/').map(s => s.trim().toLowerCase());
  const isCorrect = corrects.some(c => userAns === c);

  quiz.answered = true;
  quiz.resultList.push({ ...card, userAns, isCorrect });

  const cardEl = document.getElementById('char-card');
  const fb = document.getElementById('feedback-bar');
  const hint = document.getElementById('answer-hint');
  document.getElementById('hint-romaji').textContent = card.romaji;
  document.getElementById('hint-korean').textContent = card.korean;
  hint.style.display = 'flex';

  if (isCorrect) {
    quiz.score.ok++;
    cardEl.classList.add('correct-border');
    fb.textContent = '✓ 정답!';
    fb.className = 'feedback-bar show ok';
  } else {
    quiz.score.ng++;
    quiz.wrongQueue.push(card);
    cardEl.classList.add('wrong-border');
    fb.textContent = `✗ 오답 — 정답: ${quiz.activeMode === 'romaji' ? card.romaji : card.korean}`;
    fb.className = 'feedback-bar show ng';
    cardEl.classList.add('shake');
    setTimeout(() => cardEl.classList.remove('shake'), 500);
  }

  document.getElementById('score-ok').textContent = quiz.score.ok;
  document.getElementById('score-ng').textContent = quiz.score.ng;

  document.getElementById('input-row').style.display = 'none';
  const nextBtn = document.getElementById('next-btn');
  const isLast = quiz.qIndex + 1 >= quiz.pool.length && quiz.wrongQueue.length === 0;
  nextBtn.textContent = isLast ? '결과 보기 →' : '다음 →';
  nextBtn.style.display = 'block';
}

function nextQuestion() {
  quiz.qIndex++;
  if (quiz.qIndex >= quiz.pool.length) {
    if (quiz.wrongQueue.length > 0) {
      quiz.pool = shuffle(quiz.wrongQueue);
      quiz.wrongQueue = [];
      quiz.qIndex = 0;
      if (cfg.answerMode === 'both') {
        quiz.activeMode = quiz.activeMode === 'romaji' ? 'korean' : 'romaji';
      }
    } else {
      clearSave();
      showResult();
      return;
    }
  }
  renderQuestion();
}

// ===== QUIT DIALOG =====
function confirmQuit() {
  document.getElementById('quit-overlay').classList.add('show');
}
function closeDialog() {
  document.getElementById('quit-overlay').classList.remove('show');
}
function saveAndQuit() {
  const saveData = { category: cfg.category, cfg: { ...cfg }, quiz: { ...quiz } };
  localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
  closeDialog();
  showScreen('home');
}
function resetAndQuit() {
  clearSave();
  closeDialog();
  showScreen('home');
}
function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch { return null; }
}
function clearSave() { localStorage.removeItem(SAVE_KEY); }

// ===== RESULT =====
function showResult() {
  const { ok, ng } = quiz.score;
  const total = ok + ng;
  const rate = total > 0 ? Math.round((ok / total) * 100) : 0;

  document.getElementById('res-ok').textContent = ok;
  document.getElementById('res-ng').textContent = ng;
  document.getElementById('res-rate').textContent = rate + '%';
  document.getElementById('result-sub').textContent =
    `총 ${total}문제 · 정답 ${ok}개 · 오답 ${ng}개`;

  // Donut chart
  const r = 38, cx = 50, cy = 50, stroke = 14;
  const circ = 2 * Math.PI * r;
  const okArc = (ok / total) * circ;
  const ngArc = (ng / total) * circ;
  const rot = -Math.PI / 2;
  const svg = document.getElementById('donut-svg');
  svg.innerHTML = `
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eee" stroke-width="${stroke}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2da870" stroke-width="${stroke}"
      stroke-dasharray="${okArc} ${circ - okArc}"
      stroke-dashoffset="${-rot * r}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e05a3a" stroke-width="${stroke}"
      stroke-dasharray="${ngArc} ${circ - ngArc}"
      stroke-dashoffset="${-(rot * r + okArc)}" transform="rotate(-90 ${cx} ${cy})" style="transform-origin:${cx}px ${cy}px; transform:rotate(${(ok/total)*360 - 90}deg)"/>
    <text x="${cx}" y="${cy - 5}" text-anchor="middle" font-size="18" font-weight="900" fill="#1a1a1a">${rate}%</text>
    <text x="${cx}" y="${cy + 12}" text-anchor="middle" font-size="9" fill="#aaa">정답률</text>
  `;

  // Wrong list
  const wrongItems = quiz.resultList.filter(r => !r.isCorrect);
  const wrongSec = document.getElementById('wrong-section');
  if (wrongItems.length > 0) {
    wrongSec.innerHTML = `
      <div class="wrong-title">✗ 틀린 문제 (${wrongItems.length}개)</div>
      <div class="wrong-grid">
        ${wrongItems.map(w => `
          <div class="wrong-chip">
            <span class="wc">${w.char}</span>
            <span class="wr">${w.romaji}</span>
          </div>
        `).join('')}
      </div>
    `;
  } else {
    wrongSec.innerHTML = `<div style="text-align:center;padding:16px;color:var(--green);font-weight:700;font-size:15px;">🎉 전부 맞혔어요!</div>`;
  }

  showScreen('result');
}

function retryQuiz() { freshStart(); }

// ===== KEYBOARD =====
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!quiz.answered) checkAnswer();
    else nextQuestion();
  }
});

// ===== INIT =====
updateToggleUI();
setAnswerMode('romaji');

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
